<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jesús & Sharenia</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="contenedor">

        <h1>Jesús & Sharenia</h1>

        <p class="subtitulo">
            Confirmación de asistencia
        </p>

        <label>Nombre</label>

        <input
            type="text"
            id="nombre"
            placeholder="Escribe tu nombre">

        <button onclick="buscarInvitado()">
            Buscar
        </button>

        <div id="mensaje"></div>

        <div id="datosInvitado">

            <label>Adultos confirmados</label>
            <select id="adultos"></select>

            <div id="bloqueNinos">

                <label>Niños confirmados</label>
                <select id="ninos"></select>

            </div>

            <button onclick="confirmar()">
                Confirmar asistencia
            </button>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
