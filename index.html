<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jesús & Shareni</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="contenedor">

        <img
            src="logo.png"
            alt="Logo Boda"
            class="logo">

        <h1>Jesús & Shareni</h1>

        <p class="subtitulo">
            Confirmación de asistencia
        </p>

        <label for="nombre">
            Nombre
        </label>

        <input
            type="text"
            id="nombre"
            placeholder="Escribe tu nombre">

        <button onclick="buscarInvitado()">
            Buscar
        </button>

        <div id="mensaje"></div>

        <div id="datosInvitado">

            <label for="adultos">
                Adultos confirmados
            </label>

            <select id="adultos"></select>

            <div id="bloqueNinos">

                <label for="ninos">
                    Niños confirmados
                </label>

                <select id="ninos"></select>

            </div>

            <button onclick="confirmar()">
                Confirmar asistencia
            </button>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
